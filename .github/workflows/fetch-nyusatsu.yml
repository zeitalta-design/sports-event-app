name: "Fetch: Nyusatsu (入札)"

# ============================================================
# 入札情報を取得する。
#   ソース: 農水省 / 経産省 / 総務省 / 厚労省 / 国交省
#
# 旧 ingest-nyusatsu.mjs の Python/better-sqlite3 依存を排除し、
# Node.js/libsql 単独で動作。5省に情報源を拡充（旧3省→5省）。
#
# スケジュール: 毎日 JST 04:53
# 手動実行: workflow_dispatch で任意タイミング実行可
#
# 必要な GitHub Secrets:
#   TURSO_DATABASE_URL
#   TURSO_AUTH_TOKEN
# ============================================================

on:
  schedule:
    # 毎日 JST 04:53 = UTC 19:53 (前日)
    - cron: "53 19 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: fetch-nyusatsu
  cancel-in-progress: false

jobs:
  fetch:
    name: "入札情報（5省横断）取得"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "Info: 実行情報"
        run: |
          echo "Trigger:   ${{ github.event_name }}"
          echo "Actor:     ${{ github.actor }}"
          echo "Run ID:    ${{ github.run_id }}"
          echo "Time UTC:  $(date -u '+%Y-%m-%d %H:%M:%S')"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: "Install dependencies"
        working-directory: web
        run: npm ci --prefer-offline --no-audit

      - name: "Run: fetch-nyusatsu"
        working-directory: web
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node scripts/fetch-nyusatsu.mjs

      - name: "Alert: 失敗時 Issue 作成"
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TITLE="[Nyusatsu] 定期実行失敗 $(date -u '+%Y-%m-%d')"
          BODY=$(printf '%s\n' \
            "## 入札情報取得の定期実行失敗" \
            "" \
            "| 項目 | 値 |" \
            "|------|----|" \
            "| Run | [詳細](${RUN_URL}) |" \
            "| Time (UTC) | $(date -u '+%Y-%m-%d %H:%M:%S') |" \
            "" \
            "### 確認事項" \
            "1. 各省庁の調達ページ URL 変更" \
            "2. Turso 接続情報" \
            "3. 全ソースで0件の場合は HTML 構造の変更可能性")

          EXISTING=$(gh issue list --state open --search "in:title [Nyusatsu]" --limit 1 --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "ops" 2>/dev/null \
              || gh issue create --title "$TITLE" --body "$BODY"
          fi
